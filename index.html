<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NGHTPINK</title>
  <meta name="description" content="NGHTPINK">

  <link rel="icon" href="favicon.ico">

  <style>
    body {
      margin: 0;
      background-color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #fff;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px 30px;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      transform: translateY(-10px);
      margin: 0;
    }

    .white {
      color: #ffffff;
    }

    .pink {
      color: #f2c6c8;
    }

    /* GRID SECTION */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .grid-item {
      border-radius: 12px;
      overflow: hidden;
      background: #111;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>
      <span class="white">NGHT</span><span class="pink">PINK</span>
    </h1>
  </div>

  <!-- TIKTOK GRID -->
  <div class="container">
    <div class="grid">

      <div class="grid-item">
        <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@nghtpink/video/7519063668890291474" data-video-id="7519063668890291474">
          <section></section>
        </blockquote>
      </div>

      <div class="grid-item">
        <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@nghtpink/video/7631437875078319381" data-video-id="7631437875078319381">
          <section></section>
        </blockquote>
      </div>

      <div class="grid-item">
        <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@nghtpink/video/7635632039898729749" data-video-id="7635632039898729749">
          <section></section>
        </blockquote>
      </div>

    </div>
  </div>

  <script async src="https://www.tiktok.com/embed.js"></script>

</body>
</html>
