<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NGHTPINK</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: center;
      padding: 60px 20px 30px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 500;
      margin: 0;
    }

    .white { color: #fff; }
    .pink { color: #f2c6c8; }

    /* GRID */
    .grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* VIDEO CARD */
    .card {
      aspect-ratio: 9 / 16;
      border-radius: 14px;
      overflow: hidden;
      background: #111;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.9;
    }

    /* overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>
      <span class="white">NGHT</span><span class="pink">PINK</span>
    </h1>
  </div>

  <!-- GRID -->
  <div class="grid">

    <a class="card" href="https://www.tiktok.com/@nghtpink/video/7519063668890291474" target="_blank">
      <img src="https://www.tiktok.com/favicon.ico" alt="video 1">
      <div class="overlay"></div>
    </a>

    <a class="card" href="https://www.tiktok.com/@nghtpink/video/7631437875078319381" target="_blank">
      <img src="https://www.tiktok.com/favicon.ico" alt="video 2">
      <div class="overlay"></div>
    </a>

    <a class="card" href="https://www.tiktok.com/@nghtpink/video/7635632039898729749" target="_blank">
      <img src="https://www.tiktok.com/favicon.ico" alt="video 3">
      <div class="overlay"></div>
    </a>

  </div>

</body>
</html>
