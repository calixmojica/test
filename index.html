<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>NGHTPINK</title>

  <!-- Website description (restored) -->
  <meta name="description" content="NGHTPINK. By Calix and Rachelle.">

  <link rel="icon" href="favicon.ico">

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #fff;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: center;
      padding: 70px 20px 30px;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 500;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .white { color: #ffffff; }
    .pink { color: #f2c6c8; }

    /* GRID WRAPPER */
    .grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    /* VIDEO TILE */
    .tile {
      position: relative;
      aspect-ratio: 9 / 16;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
      cursor: pointer;
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .tile:hover {
      transform: scale(1.03);
      filter: brightness(1.1);
    }

    /* REALISTIC VISUAL FILL (clean fallback look) */
    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
    }

    /* overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.6),
        rgba(0,0,0,0.1)
      );
    }

    /* play icon */
    .play {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      opacity: 0.85;
      pointer-events: none;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>
      <span class="white">NGHT</span><span class="pink">PINK</span>
    </h1>
  </div>

  <!-- GRID -->
  <div class="grid">

    <a class="tile" href="https://www.tiktok.com/@nghtpink/video/7519063668890291474" target="_blank">
      <div class="overlay"></div>
      <div class="play">▶</div>
    </a>

    <a class="tile" href="https://www.tiktok.com/@nghtpink/video/7631437875078319381" target="_blank">
      <div class="overlay"></div>
      <div class="play">▶</div>
    </a>

    <a class="tile" href="https://www.tiktok.com/@nghtpink/video/7635632039898729749" target="_blank">
      <div class="overlay"></div>
      <div class="play">▶</div>
    </a>

  </div>

</body>
</html>
