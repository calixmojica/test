<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>NGHTPINK</title>

  <meta name="description" content="NGHTPINK. Designed by Calix and Rachelle.">

  <link rel="icon" href="favicon.ico">

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #fff;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: center;
      padding: 70px 20px 30px;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 500;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .white { color: #ffffff; }
    .pink { color: #f2c6c8; }

    /* GRID */
    .grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    /* TILE */
    .tile {
      position: relative;
      aspect-ratio: 9 / 16;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      background: #111;
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .tile:hover {
      transform: scale(1.03);
      filter: brightness(1.1);
    }

    /* THUMBNAIL */
    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.65), rgba(0,0,0,0.1));
    }

    /* play icon */
    .play {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      opacity: 0.9;
      pointer-events: none;
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal iframe {
      width: 420px;
      height: 750px;
      border: none;
      border-radius: 14px;
    }

    /* CLOSE BUTTON */
    .close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: white;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>
      <span class="white">NGHT</span><span class="pink">PINK</span>
    </h1>
  </div>

  <!-- GRID -->
  <div class="grid">

    <div class="tile" onclick="openVideo('7519063668890291474')">
      <img src="https://www.tiktok.com/api/img/?itemId=7519063668890291474" alt="">
      <div class="overlay"></div>
      <div class="play">▶</div>
    </div>

    <div class="tile" onclick="openVideo('7631437875078319381')">
      <img src="https://www.tiktok.com/api/img/?itemId=7631437875078319381" alt="">
      <div class="overlay"></div>
      <div class="play">▶</div>
    </div>

    <div class="tile" onclick="openVideo('7635632039898729749')">
      <img src="https://www.tiktok.com/api/img/?itemId=7635632039898729749" alt="">
      <div class="overlay"></div>
      <div class="play">▶</div>
    </div>

  </div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="close" onclick="closeVideo()">✕</div>
    <iframe id="frame" src="" allowfullscreen></iframe>
  </div>

  <script>
    function openVideo(id) {
      document.getElementById("modal").style.display = "flex";
      document.getElementById("frame").src =
        "https://www.tiktok.com/embed/v2/" + id;
    }

    function closeVideo() {
      document.getElementById("modal").style.display = "none";
      document.getElementById("frame").src = "";
    }

    // close modal on background click
    document.getElementById("modal").addEventListener("click", function(e) {
      if (e.target === this) closeVideo();
    });
  </script>

</body>
</html>
